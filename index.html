<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Streetwear Blantyre - Wear the Culture</title>
    <meta name="description" content="Streetwear Blantyre - Streetwear fashion for the culture. T-shirts, hoodies, caps, sneakers. Order via WhatsApp in Malawi." />
    <meta name="author" content="Streetwear Blantyre" />
    <link rel="icon" type="image/png" href="/streetwear-blantyre-logo.png" />
    
    <!-- Critical inline CSS - prevents white flash -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background-color: #fafafa;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      /* Loading spinner while React loads */
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background-color: #0a0a0a;
      }
      #root:empty::after {
        content: '';
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255,255,255,0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>

    <meta property="og:title" content="Streetwear Blantyre - Wear the Culture" />
    <meta property="og:description" content="Streetwear fashion for the culture. From campus to the streets, never miss a fit." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/streetwear-blantyre-logo.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/streetwear-blantyre-logo.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
